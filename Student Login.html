<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Student Login</h1>
  </header>

  <div class="container">
    <div class="card" style="max-width: 400px; margin: auto;">
      <h2>Login</h2>
      <form action="Student Home.html" method="get">
        <label>Email:</label><br>
        <input type="text" id="email" required><br><br>

        <label>Password:</label><br>
        <input type="password" id="password" required><br><br>

        <input type="submit" value="Login" class="button-submit">
      </form>

      <hr style="margin: 20px 0;">

      <a href="Student signup.html" class="link-button">Don't have an account? Sign Up</a>
    </div>
  </div>

  
<script src="script.js"></script>
</body>
</html>
