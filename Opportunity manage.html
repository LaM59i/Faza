<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add / Edit Opportunity | Fazaa</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background-color: #f9fafb;
      color: #333;
      text-align: center;
      margin: 0;
      padding: 30px;
    }

    header {
      background: linear-gradient(90deg, #0b3d2e 0%, #0f4c75 100%);
      padding: 12px 0;
      margin-bottom: 30px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 15px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    h1 {
      color: #0f4c75;
      margin-bottom: 20px;
    }

    form {
      background: white;
      width: 90%;
      max-width: 480px;
      margin: 0 auto;
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      text-align: left;
    }

    label {
      font-weight: 500;
      display: block;
      margin-bottom: 5px;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      resize: none;
    }

    .button {
      display: block;
      background-color: #0f4c75;
      color: white;
      padding: 8px 20px;
      border-radius: 25px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s, transform 0.2s;
      width: 100%;
      text-align: center;
    }

    .button:hover {
      background-color: #0b3d2e;
      transform: scale(1.03);
    }

  </style>
</head>
<body>

  <header>
    <nav> 
      <a href="Opportunitie.html">Back to Opportunities</a>
    </nav>
  </header>

  <h1>Add / Edit Opportunity</h1>

  <form>
    <label>Select Opportunity (Leave blank to add new):</label>
    <select name="opportunity">
      <option value="">-- New Opportunity --</option>
    
    </select>

    <label>Title:</label>
    <input type="text" name="title" value="">

    <label>Date:</label>
    <input type="date" name="date">

    <label>Description:</label>
    <textarea name="description" rows="4"></textarea>

    <label>Volunteers Num:</label>
    <input type="number" name="volunteers">

    <label>Hours:</label>
    <input type="number" name="hours">

    <input type="submit" value="Save / Add Opportunity" class="button">
  </form>
  <script src="script.js"></script>
</body>
</html>
