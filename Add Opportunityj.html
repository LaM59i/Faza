<!DOCTYPE html>
<html>
<head>
  <title>Add Opportunity</title>
</head>
<body>
  <h1>Add One Opportunity</h1>

  <form id="opportunityForm">
    <input type="text" id="title" placeholder="Title" required><br>
    <input type="date" id="date" required><br>
    <textarea id="description" placeholder="Description" required></textarea><br>
    <input type="number" id="volunteers_needed" placeholder="Volunteers Needed" required><br>
    <input type="number" id="hours" placeholder="Hours" required><br>
    <select id="status">
      <option value="active">Active</option>
      <option value="upcoming">Upcoming</option>
      <option value="inactive">Inactive</option>
    </select><br><br>
    <button type="submit">Add Opportunity</button>
  </form>

  <p id="result"></p>

  <script>
    const form = document.getElementById("opportunityForm");
    const result = document.getElementById("result");

    form.addEventListener("submit"), (e) => {
      e.preventDefault();

      const data = {
        title: document.getElementById("title").value,
        date: document.getElementById("date").value,
        description: document.getElementById("description").value,
        volunteers_needed: parseInt(document.getElementById("volunteers_needed").value),
        hours: parseInt(document.getElementById("hours").value),
        status: document.getElementById("status").value
      };

      fetch('http://localhost:3000/addOpportunity', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(res => res.text())
      .then(msg => {
        result.textContent = msg;
        form.reset();
      })
      .catch
    }
