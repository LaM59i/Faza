<!DOCTYPE html>
<html>
<head>
  <title>Add Student</title>
</head>
<body>
  <h1>Add One Student</h1>

  <form id="studentForm">
    <input type="text" id="name" placeholder="Name" required><br>
    <input type="text" id="student_id" placeholder="Student ID" required><br>
    <input type="email" id="email" placeholder="Email" required><br>
    <input type="password" id="password" placeholder="Password" required><br>
    <input type="text" id="college" placeholder="College"><br>
    <input type="text" id="phone" placeholder="Phone"><br>
    <button type="submit">Add Student</button>
  </form>

  <p id="result"></p>

  <script>
    const form = document.getElementById("studentForm");
    const result = document.getElementById("result");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        student_id: document.getElementById("student_id").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        college: document.getElementById("college").value,
        phone: document.getElementById("phone").value
      };

      fetch('http://localhost:3000/addStudent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(res => res.text())
      .then(msg => {
        result.textContent = msg;
        form.reset();
      })
      .catch(err => result.textContent = "Error: " + err);
    });
  </script>
</body>
</html>
