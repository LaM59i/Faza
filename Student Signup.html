<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Student Sign Up</h1>
  </header>

  <div class="container">
    <div class="card" style="max-width: 450px; margin: auto;">
      <h2>Create Your Account</h2>

      <form action="Student Home.html" method="get">
        <label>Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Student ID:</label><br>
        <input type="text" name="studentID" required><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>
        
        <label> Confirm Password :</label><br>
        <input type="password" name="password" required><br><br>

        <label>Phone Number:</label><br>
        <input type="text" name="phone" required><br><br>

        <label>College:</label><br>
        <input type="text" name="college"><br><br>

        <input type="submit" value="Sign Up" class="button-submit">
      </form>

      <hr style="margin: 20px 0;">

      <a href="index.html" class="link-button">Back to Home</a>
    </div>
  </div>
   <script src="script.js"></script>
</body>
</html>
